# Automated releases.
#
# release-please watches `main`, keeps a "release PR" that bumps the version
# (package.json + src-tauri/tauri.conf.json + Cargo.toml) and updates CHANGELOG.md
# from the Conventional Commit history. Merging that PR creates the `vX.Y.Z` tag
# and a GitHub Release; the build job then compiles the signed Windows installer
# and uploads it (plus latest.json for the updater) to that release.
#
# Repo secrets required for signed updater artifacts:
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    # Fail fast instead of burning the 6h default if a step hangs (e.g. the
    # updater signer waiting on a missing key password).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: npm ci
      - name: Build + upload installer to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Must match the password set during `tauri signer generate` (empty
          # string if the key has no password) — otherwise signing hangs on a
          # password prompt.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.release-please.outputs.release_id }}
          args: --verbose
